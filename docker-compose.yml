services:
  postgres:
    image: postgres:15-alpine
    container_name: modaco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: modaco
      POSTGRES_PASSWORD: modaco
      POSTGRES_DB: modaco
    ports:
      - '5432:5432'
    volumes:
      - modaco_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U modaco -d modaco']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: modaco-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - modaco_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  modaco_postgres_data:
  modaco_redis_data:
